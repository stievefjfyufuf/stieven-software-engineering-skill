interface:
  display_name: "Acceptance Testing"
  short_description: "UAT dan validasi user flow."
  default_prompt: >-
    When executing the workflow, follow the Artifact Persistence rules in SKILL.md, verify the saved Markdown artifact, and report its exact path.
    Use 14-se-acceptance-testing. Read references/skill-docs.md first, then create or execute UAT scenarios mapped to AC, TEST, REQ, stakeholder roles, and release scope. Include realistic user journeys, evidence needed, pass/fail status, blockers, stakeholder sign-off, and a clear accept/reject/defer decision. Route pre-baseline defects back to affected implementation or design work; use change control only for an approved baseline or intentionally deferred scope.
